# Configuración de build de AWS Amplify Hosting.
# Amplify usa este archivo automáticamente en cada push a la rama conectada:
# instala dependencias, compila el sitio Astro y publica el contenido de `dist`.
# No se necesita un workflow de GitHub Actions: el deploy es automático.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Astro 6 requiere Node 22.12+ (la imagen por defecto de Amplify trae
        # Node 16). Fijamos la versión con nvm antes de instalar dependencias.
        - nvm install 22
        - nvm use 22
        # El package-lock.json se generó con npm 11; alineamos la versión de npm
        # para que `npm ci` lea el lockfile con el mismo formato (npm 10 y 11
        # registran las dependencias opcionales de forma distinta).
        - npm install -g npm@11
        - node -v
        - npm -v
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Astro genera el sitio estático en `dist`.
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      # Acelera builds sucesivos reutilizando dependencias y la caché de npm.
      - node_modules/**/*
      - .npm/**/*
