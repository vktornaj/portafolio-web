version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      # GITHUB_TOKEN se define en App settings > Environment variables.
      # Está disponible aquí como variable de entorno durante el build.
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
